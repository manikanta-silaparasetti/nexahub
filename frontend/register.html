<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NexaHub</title>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 50px;">
        <div class="card">
            <h1 class="text-center" style="margin-bottom: 30px;">Register on NexaHub</h1>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number" required>
                </div>
                
                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" class="form-control" required>
                        <option value="">Select Role</option>
                        <option value="pg_owner">PG Owner</option>
                        <option value="tenant">Tenant</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="parent">Parent</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
            
            <p class="text-center mt-20">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/validation.js"></script>
    <script src="assets/js/components/notifications.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearFieldErrors();
            
            const full_name = document.getElementById('full_name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            
            // Validation
            if (password !== confirm_password) {
                showError('Passwords do not match');
                showFieldError('confirm_password', 'Passwords do not match');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('Invalid email format');
                showFieldError('email', 'Invalid email format');
                return;
            }
            
            if (!validatePhone(phone)) {
                showError('Invalid phone number');
                showFieldError('phone', 'Invalid phone number (must be 10 digits)');
                return;
            }
            
            try {
                await register({ full_name, email, phone, role, password });
                showSuccess('Registration successful! Please login.');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                showError(error.message || 'Registration failed');
            }
        });
    </script>
</body>
</html>
